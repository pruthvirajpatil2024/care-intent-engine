<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CARE Bot — Intent Engine</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:system-ui,sans-serif}
#wrap{display:flex;flex-direction:column;height:640px;width:420px;background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
#topbar{background:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid #e0e0e0}
.av{width:38px;height:38px;border-radius:50%;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:#2e7d32}
.tinfo .tname{font-size:14px;font-weight:500;color:#111}
.tinfo .tsub{font-size:11px;color:#999}
#msgs{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px;background:#fff}
#empty-hint{display:flex;align-items:center;justify-content:center;height:100%;color:#bbb;font-size:13px}
.row{display:flex;flex-direction:column}
.row.you{align-items:flex-end}
.row.bot{align-items:flex-start}
.bub{max-width:72%;padding:9px 12px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;color:#111}
.bub.you{background:#dcf8c6;border-radius:12px 12px 2px 12px}
.bub.bot{background:#f1f1f1;border-radius:12px 12px 12px 2px}
.ts{font-size:10px;color:#aaa;margin-top:3px;padding:0 3px}
.dbg{font-size:10px;color:#bbb;margin-top:2px;padding:2px 6px;background:#f9f9f9;border-radius:4px;font-family:monospace}
.opts{display:flex;flex-direction:column;gap:6px;margin-top:4px;max-width:72%}
.opt-btn{width:100%;padding:9px 14px;border:1.5px solid #25a244;border-radius:8px;background:#fff;color:#25a244;font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:background .15s}
.opt-btn:hover{background:#f0faf3}
.opt-btn:active{background:#e0f5e8}
.opt-btn:disabled{opacity:0.4;cursor:default}
.opt-btn.link-btn{border-color:#1a73e8;color:#1a73e8}
.opt-btn.link-btn:hover{background:#e8f0fe}
.opt-btn.nav-btn{border-color:#aaa;color:#666;font-size:12px;padding:7px 14px}
.opt-btn.nav-btn:hover{background:#f5f5f5}
.divider{font-size:11px;color:#aaa;padding:2px 0}
#bar{padding:10px 12px;border-top:0.5px solid #e0e0e0;display:flex;gap:8px;background:#fff}
#inp{flex:1;padding:9px 14px;border-radius:22px;border:0.5px solid #ccc;font-size:13px;outline:none;color:#111;background:#fff}
#inp:focus{border-color:#25a244}
#inp:disabled{background:#f5f5f5;color:#aaa;cursor:not-allowed}
#sbtn{padding:9px 18px;border-radius:1px;background:#f6f8f6;border:1px;color:#0c0c0c;font-size:13px;font-weight:500;cursor:pointer}
#sbtn:hover{background:#f3f5f4}
#sbtn:disabled{background:#ccc;cursor:not-allowed}
.typing-row{display:flex}
.tbub{background:#f1f1f1;border-radius:12px 12px 12px 2px;padding:10px 14px;display:inline-flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:#aaa;animation:bl 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}
.locked-banner{background:#fff3f3;border:0.5px solid #ffcdd2;border-radius:8px;padding:10px 14px;font-size:12px;color:#c62828;text-align:center;margin:0 14px 10px}
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <div class="av">C</div>
    <div class="tinfo">
      <div class="tname">CARE Bot</div>
      <div class="tsub">OHC Health Assistant</div>
    </div>
  </div>
  <div id="msgs">
    <div id="empty-hint"></div>
  </div>
  <div id="bar">
    <input id="inp" placeholder=""/>
    <button id="sbtn">SEND</button>
  </div>
</div>

<script>
const PATIENTS={"+919000000001":{name:"Pruthviraj Patil",yob:1990,medicines:[{id:1,name:"Metformin",dose:"500mg",timing:"Morning after food",freq:"Twice daily",duration:"Ongoing"},{id:2,name:"Atorvastatin",dose:"10mg",timing:"Night after food",freq:"Once daily",duration:"Ongoing"},{id:3,name:"Aspirin",dose:"75mg",timing:"Morning after food",freq:"Once daily",duration:"Ongoing"},{id:4,name:"Lisinopril",dose:"5mg",timing:"Morning",freq:"Once daily",duration:"3 months"},{id:5,name:"Omeprazole",dose:"20mg",timing:"Before breakfast",freq:"Once daily",duration:"30 days"},{id:6,name:"Cetirizine",dose:"10mg",timing:"Night",freq:"Once daily",duration:"15 days"},{id:7,name:"Vitamin D3",dose:"60000IU",timing:"Sunday morning",freq:"Once weekly",duration:"3 months"}],appointments:[{id:1,doctor:"Dr. Meena Kulkarni",dept:"Cardiology",date:"18 Mar 2026",time:"10:30 AM",status:"Confirmed"},{id:2,doctor:"Dr. Arjun Patil",dept:"General Medicine",date:"25 Mar 2026",time:"02:00 PM",status:"Pending"}],vitals:{bp:"122/80 mmHg",sugar:"108 mg/dL",weight:"72 kg",pulse:"78 bpm",recorded:"14 Mar 2026"},records:[{id:1,type:"Blood Report",date:"10 Mar 2026",lab:"City Diagnostics"},{id:2,type:"ECG Report",date:"01 Mar 2026",lab:"CARE Hospital"}]}};

const DEMO="+919000000001";
const PAGE_SIZE=5;
let S={phase:"welcome",yobTries:0,activeHandler:null,step:0,ctx:{}};
let PAT=null;

const msgs=document.getElementById("msgs");
const inp=document.getElementById("inp");
const sbtn=document.getElementById("sbtn");

function now(){const d=new Date();let h=d.getHours(),m=d.getMinutes(),ap=h>=12?"PM":"AM";h=h%12||12;return`${h}:${m.toString().padStart(2,"0")} ${ap}`}
function clearHint(){const h=document.getElementById("empty-hint");if(h)h.remove();}

function lockUI(){
  inp.disabled=true;sbtn.disabled=true;
  inp.placeholder="Access locked. Please try after 24 hours.";
  const banner=document.createElement("div");
  banner.className="locked-banner";
  banner.textContent="Access locked. Please try again after 24 hours.";
  document.getElementById("wrap").insertBefore(banner,document.getElementById("bar"));
}

function addMsg(who,text,intent,handler,opts){
  clearHint();
  const row=document.createElement("div");
  row.className="row "+who;
  const bub=document.createElement("div");
  bub.className="bub "+who;
  bub.textContent=text;
  row.appendChild(bub);
  const ts=document.createElement("div");
  ts.className="ts";ts.textContent=now();
  row.appendChild(ts);
  if(intent||handler){
    const dbg=document.createElement("div");
    dbg.className="dbg";
    dbg.textContent=(intent?"Intent: "+intent:"")+(handler?"  Handler: "+handler:"");
    row.appendChild(dbg);
  }
  msgs.appendChild(row);
  if(opts&&opts.length){
    const ob=document.createElement("div");ob.className="opts";
    opts.forEach(o=>{
      if(o.divider){const d=document.createElement("div");d.className="divider";d.textContent=o.divider;ob.appendChild(d);return;}
      const btn=document.createElement("button");
      const isNav=(o.val==="__next__"||o.val==="__prev__");
      btn.className="opt-btn"+(o.link?" link-btn":"")+(isNav?" nav-btn":"");
      btn.textContent=o.label;
      if(o.link){btn.onclick=()=>{window.open(o.link,"_blank");};}
      else{btn.onclick=()=>{ob.querySelectorAll(".opt-btn").forEach(b=>b.disabled=true);sendDirect(o.label,o.val);};}
      ob.appendChild(btn);
    });
    msgs.appendChild(ob);
  }
  msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  clearHint();
  const r=document.createElement("div");r.className="typing-row";r.id="typing";
  r.innerHTML=`<div class="tbub"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(r);msgs.scrollTop=msgs.scrollHeight;
}

const MAIN_OPTS=[{label:"Medicines",val:"1"},{label:"Appointments",val:"2"},{label:"Vitals",val:"3"},{label:"Records",val:"4"},{label:"Help",val:"5"}];
const HELP_OPTS=[{divider:"— Learn how to use CARE Bot —"},{label:"▶  Watch Tutorial on YouTube",link:"https://www.youtube.com/results?search_query=CARE+OHC+bot+tutorial"},{label:"📖  Read the Website Guide",link:"https://care.ohc.network/"},{divider:"— Need human support? —"},{label:"📞  Contact Support",val:"support"},{divider:"— Go back —"},{label:"Back to main menu",val:"0"}];

function mainMenu(){return`Hi ${PAT.name}!\nHow can I assist you today?`;}
function unknownMenu(){return`Here's what I can help you with:`;}

// ── KEY FIX: all known top-level intents are listed here ──
function detectIntent(m){
  if(["1","medicine","medicines","med","meds"].includes(m))return"medicine";
  if(["2","appointment","appointments","appt"].includes(m))return"appointment";
  if(["3","vital","vitals","bp","sugar"].includes(m))return"vitals";
  if(["4","record","records","report","reports"].includes(m))return"records";
  if(["5","help"].includes(m))return"help";
  if(["support","contact","helpline"].includes(m))return"support";
  if(["0","cancel","exit","back","menu","main"].includes(m))return"cancel";
  return"unknown";
}

// returns true ONLY for text-based top-level commands — never for bare numbers.
// Numbers like "1","2","3","4","5" are ambiguous (list selection vs menu shortcut)
// so they must stay within the active handler flow, not escape it.
function isTopLevelEscape(m){
  if(/^\d+$/.test(m)) return false; // pure number → never escape
  return detectIntent(m)!=="unknown";
}

function buildMedPage(meds,page){
  const totalPages=Math.ceil(meds.length/PAGE_SIZE);
  const start=page*PAGE_SIZE;
  const slice=meds.slice(start,start+PAGE_SIZE);
  const opts=slice.map((med,i)=>({label:`${med.name} — ${med.dose}`,val:`${start+i+1}`}));
  const nav=[];
  if(page>0)nav.push({label:"← Previous page",val:"__prev__"});
  if(page<totalPages-1)nav.push({label:"Next page →",val:"__next__"});
  return{text:`Your medicines (${meds.length})\nPage ${page+1} of ${totalPages} — showing ${start+1}–${Math.min(start+PAGE_SIZE,meds.length)}:`,intent:"medicine",handler:"MedicineHandler.list_page_"+(page+1),opts:[...opts,...nav,{label:"Back to main menu",val:"0"}]};
}

function handleMed(m){
  if(m==="__next__"){S.ctx.medPage=(S.ctx.medPage||0)+1;return buildMedPage(S.ctx.meds,S.ctx.medPage);}
  if(m==="__prev__"){S.ctx.medPage=Math.max(0,(S.ctx.medPage||0)-1);return buildMedPage(S.ctx.meds,S.ctx.medPage);}
  if(S.step===0){const meds=PAT.medicines;S.ctx.meds=meds;S.ctx.medPage=0;S.step=1;return buildMedPage(meds,0);}
  if(S.step===1){
    const n=parseInt(m),meds=S.ctx.meds;
    if(isNaN(n)||n<1||n>meds.length){
      if(isNaN(n)){S.activeHandler=null;S.step=0;S.ctx={};return{text:unknownMenu(),intent:"unknown",handler:"Dispatcher.unknown_to_menu",opts:MAIN_OPTS};}
      return{...buildMedPage(meds,S.ctx.medPage||0),text:`Please select a number between 1 and ${meds.length}.`};
    }
    const med=meds[n-1];S.ctx.sel=med;S.step=2;
    return{text:`${med.name}\n─────────────────\nDose      : ${med.dose}\nTiming    : ${med.timing}\nFrequency : ${med.freq}\nDuration  : ${med.duration}`,intent:"medicine",handler:"MedicineHandler.detail",opts:[{label:"View another medicine",val:"1"},{label:"Back to main menu",val:"0"}]};
  }
  if(S.step===2){if(m==="1"){S.step=0;return handleMed(m);}return null;}
}

function handleAppt(m){
  if(S.step===0){const a=PAT.appointments;S.ctx.apts=a;S.step=1;const opts=a.map((ap,i)=>({label:`${ap.doctor} — ${ap.date} ${ap.time}`,val:`${i+1}`}));opts.push({label:"Back to main menu",val:"0"});return{text:`Your appointments (${a.length})\nSelect one to view details:`,intent:"appointment",handler:"AppointmentHandler.list",opts};}
  if(S.step===1){const n=parseInt(m),a=S.ctx.apts;if(isNaN(n)||n<1||n>a.length){if(isNaN(n)){S.activeHandler=null;S.step=0;S.ctx={};return{text:unknownMenu(),intent:"unknown",handler:"Dispatcher.unknown_to_menu",opts:MAIN_OPTS};}const opts=a.map((ap,i)=>({label:`${ap.doctor} — ${ap.date}`,val:`${i+1}`}));opts.push({label:"Back to main menu",val:"0"});return{text:`Please select a number between 1 and ${a.length}.`,intent:"appointment",handler:"AppointmentHandler.invalid",opts};}const ap=a[n-1];S.step=2;return{text:`Appointment Details\n─────────────────\nDoctor    : ${ap.doctor}\nDept      : ${ap.dept}\nDate      : ${ap.date}\nTime      : ${ap.time}\nStatus    : ${ap.status}`,intent:"appointment",handler:"AppointmentHandler.detail",opts:[{label:"View another appointment",val:"1"},{label:"Back to main menu",val:"0"}]};}
  if(S.step===2){if(m==="1"){S.step=0;return handleAppt(m);}return null;}
}

function handleVitals(){const v=PAT.vitals;S.step=1;return{text:`Latest Vitals\n─────────────────\nBP         : ${v.bp}\nBlood Sugar: ${v.sugar}\nWeight     : ${v.weight}\nPulse      : ${v.pulse}\nRecorded   : ${v.recorded}`,intent:"vitals",handler:"VitalsHandler.show",opts:[{label:"Back to main menu",val:"0"}]};}

function handleRec(m){
  if(S.step===0){const r=PAT.records;S.ctx.recs=r;S.step=1;const opts=r.map((rec,i)=>({label:`${rec.type} — ${rec.date}`,val:`${i+1}`}));opts.push({label:"Back to main menu",val:"0"});return{text:`Your records (${r.length})\nSelect one to view details:`,intent:"records",handler:"RecordsHandler.list",opts};}
  if(S.step===1){const n=parseInt(m),r=S.ctx.recs;if(isNaN(n)||n<1||n>r.length){if(isNaN(n)){S.activeHandler=null;S.step=0;S.ctx={};return{text:unknownMenu(),intent:"unknown",handler:"Dispatcher.unknown_to_menu",opts:MAIN_OPTS};}const opts=r.map((rec,i)=>({label:`${rec.type} — ${rec.date}`,val:`${i+1}`}));opts.push({label:"Back to main menu",val:"0"});return{text:`Please select a number between 1 and ${r.length}.`,intent:"records",handler:"RecordsHandler.invalid",opts};}const rec=r[n-1];S.step=2;return{text:`Record Details\n─────────────────\nType    : ${rec.type}\nDate    : ${rec.date}\nLab     : ${rec.lab}\nStatus  : Available`,intent:"records",handler:"RecordsHandler.detail",opts:[{label:"View another record",val:"1"},{label:"Back to main menu",val:"0"}]};}
  if(S.step===2){if(m==="1"){S.step=0;return handleRec(m);}return null;}
}

function dispatch(val){
  const m=val.trim().toLowerCase();
  if(S.phase==="locked")return null;

  if(S.phase==="welcome"){
    S.phase="yob";
    return{text:"Hello! Welcome to CARE Bot\n\nTo assist you, please enter your year of birth.\n\nExample: 1990",intent:"auth",handler:"AuthHandler.ask_yob",opts:[]};
  }

  if(S.phase==="yob"){
    const yob=parseInt(m),p=PATIENTS[DEMO];
    if(yob===p.yob){S.phase="verified";PAT=p;return{text:mainMenu(),intent:"auth",handler:"AuthHandler.verified",opts:MAIN_OPTS};}
    S.yobTries++;
    if(S.yobTries>=3){S.phase="locked";setTimeout(lockUI,100);return{text:"Too many incorrect attempts.\n\nPlease try again after 24 hours.",intent:"auth",handler:"AuthHandler.locked",opts:[]};}
    return{text:`Incorrect year of birth. Please try again.\n\n${3-S.yobTries} attempt${3-S.yobTries===1?"":"s"} remaining.`,intent:"auth",handler:"AuthHandler.mismatch",opts:[]};
  }

  // ── cancel / back always resets ──
  if(["0","cancel","exit","back","menu","main"].includes(m)){
    S.activeHandler=null;S.step=0;S.ctx={};
    return{text:mainMenu(),intent:"cancel",handler:"Dispatcher.reset",opts:MAIN_OPTS};
  }

  // ── pagination passes straight through to active handler ──
  if(S.activeHandler&&(m==="__next__"||m==="__prev__")&&S.activeHandler==="medicine"){
    return handleMed(m);
  }

  // ── ESCAPE FIX: if mid-flow but user typed a text-based known intent
  //    (e.g. "medicine", "support", "help") — escape and re-route.
  //    Pure numbers (1,2,3…) are NEVER treated as escape triggers —
  //    they belong to the active handler's list selection. ──
  if(S.activeHandler&&S.activeHandler!=="help"&&isTopLevelEscape(m)){
    S.activeHandler=null;S.step=0;S.ctx={};
    // fall through to intent routing below
  }

  // ── continue active flow if still set ──
  if(S.activeHandler&&S.activeHandler!=="help"){
    let res=null;
    if(S.activeHandler==="medicine")res=handleMed(m);
    else if(S.activeHandler==="appointment")res=handleAppt(m);
    else if(S.activeHandler==="vitals")res=handleVitals();
    else if(S.activeHandler==="records")res=handleRec(m);
    if(res)return res;
    // handler returned null → reset and fall through
    S.activeHandler=null;S.step=0;S.ctx={};
  }

  // ── top-level intent routing ──
  const intent=detectIntent(m);

  // unknown → show menu (never show error)
  if(intent==="unknown"){
    return{text:unknownMenu(),intent:"unknown",handler:"Dispatcher.unknown_to_menu",opts:MAIN_OPTS};
  }
  if(intent==="cancel"){
    S.activeHandler=null;S.step=0;S.ctx={};
    return{text:mainMenu(),intent:"cancel",handler:"Dispatcher.reset",opts:MAIN_OPTS};
  }
  if(intent==="help"){
    S.activeHandler="help";
    return{text:"How can I help you?\n\nChoose an option below:",intent:"help",handler:"HelpHandler",opts:HELP_OPTS};
  }
  if(intent==="support"){
    return{text:"Support Contact\n─────────────────\nPhone   : +91-800-CARE-OHC\nEmail   : support@care.ohc.network\nHours   : Mon–Sat, 9 AM – 6 PM\n\nOur team will get back to you shortly.",intent:"support",handler:"HelpHandler.support",opts:[{label:"Back to main menu",val:"0"}]};
  }

  S.activeHandler=intent;S.step=0;S.ctx={};
  if(intent==="medicine")return handleMed(m);
  if(intent==="appointment")return handleAppt(m);
  if(intent==="vitals")return handleVitals();
  if(intent==="records")return handleRec(m);
}

function sendDirect(displayText,valText){
  if(S.phase==="locked")return;
  addMsg("you",displayText,null,null,[]);
  showTyping();
  setTimeout(()=>{
    document.getElementById("typing")?.remove();
    const res=dispatch(valText);
    if(res)addMsg("bot",res.text,res.intent,res.handler,res.opts||[]);
  },380);
}

function send(){
  const val=inp.value.trim();if(!val)return;
  inp.value="";
  sendDirect(val,val);
}

inp.addEventListener("keydown",e=>{if(e.key==="Enter")send();});
sbtn.addEventListener("click",send);
</script>
</body>
</html>
