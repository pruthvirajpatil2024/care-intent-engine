<meta charset="UTF-8"/>

<title>CARE Bot — Multilingual</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:system-ui,sans-serif}
#wrap{display:flex;flex-direction:column;height:680px;width:420px;background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
#topbar{background:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid #e0e0e0}
.av{width:38px;height:38px;border-radius:50%;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:#2e7d32}
.tinfo .tname{font-size:14px;font-weight:500;color:#111}
.tinfo .tsub{font-size:11px;color:#999}
#lang-badge{margin-left:auto;font-size:11px;padding:3px 8px;border-radius:10px;background:#e8f5e9;color:#2e7d32;font-weight:500}
#msgs{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px;background:#fff}
#empty-hint{display:flex;align-items:center;justify-content:center;height:100%;color:#bbb;font-size:13px}
.row{display:flex;flex-direction:column}
.row.you{align-items:flex-end}
.row.bot{align-items:flex-start}
.bub{max-width:75%;padding:9px 12px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;color:#111}
.bub.you{background:#dcf8c6;border-radius:12px 12px 2px 12px}
.bub.bot{background:#f1f1f1;border-radius:12px 12px 12px 2px}
.ts{font-size:10px;color:#aaa;margin-top:3px;padding:0 3px}
.dbg{font-size:10px;color:#bbb;margin-top:2px;padding:2px 6px;background:#f9f9f9;border-radius:4px;font-family:monospace}
.opts{display:flex;flex-direction:column;gap:6px;margin-top:4px;max-width:75%}
.opt-btn{width:100%;padding:9px 14px;border:1.5px solid #25a244;border-radius:8px;background:#fff;color:#25a244;font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:background .15s}
.opt-btn:hover{background:#f0faf3}
.opt-btn:active{background:#e0f5e8}
.opt-btn:disabled{opacity:0.4;cursor:default}
.opt-btn.link-btn{border-color:#1a73e8;color:#1a73e8}
.opt-btn.link-btn:hover{background:#e8f0fe}
.opt-btn.nav-btn{border-color:#aaa;color:#666;font-size:12px;padding:7px 14px}
.opt-btn.nav-btn:hover{background:#f5f5f5}
.opt-btn.lang-btn{border-color:#7c4dff;color:#7c4dff;font-size:13px}
.opt-btn.lang-btn:hover{background:#f3e5f5}
.divider{font-size:11px;color:#aaa;padding:2px 0}
#bar{padding:10px 12px;border-top:0.5px solid #e0e0e0;display:flex;gap:8px;background:#fff}
#inp{flex:1;padding:9px 14px;border-radius:22px;border:0.5px solid #ccc;font-size:13px;outline:none;color:#111;background:#fff}
#inp:focus{border-color:#25a244}
#inp:disabled{background:#f5f5f5;color:#aaa;cursor:not-allowed}
#sbtn{padding:9px 18px;border-radius:1px;background:#f6f8f6;border:1px;color:#0c0c0c;font-size:13px;font-weight:500;cursor:pointer}
#sbtn:hover{background:#f3f5f4}
#sbtn:disabled{background:#ccc;cursor:not-allowed}
.typing-row{display:flex}
.tbub{background:#f1f1f1;border-radius:12px 12px 12px 2px;padding:10px 14px;display:inline-flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:#aaa;animation:bl 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}
.locked-banner{background:#fff3f3;border:0.5px solid #ffcdd2;border-radius:8px;padding:10px 14px;font-size:12px;color:#c62828;text-align:center;margin:0 14px 10px}
</style>

// ── 3-Layer Language Detection ────────────────────────────────────────────────

// Layer 1: Unicode script ranges
function detectByScript(text){
  for(const char of text){
    const cp=char.codePointAt(0);
    if(cp>=0x0900&&cp<=0x097F)return"deva";  // Devanagari: Hindi or Marathi
    if(cp>=0x0C00&&cp<=0x0C7F)return"te";    // Telugu
    if(cp>=0x0B80&&cp<=0x0BFF)return"ta";    // Tamil
    if(cp>=0x0C80&&cp<=0x0CFF)return"kn";    // Kannada
    if(cp>=0x0980&&cp<=0x09FF)return"bn";    // Bengali — not supported, fallback
    if(cp>=0x0A80&&cp<=0x0AFF)return"gu";    // Gujarati — not supported, fallback
    if(cp>=0x0D00&&cp<=0x0D7F)return"ml";    // Malayalam — not supported, fallback
  }
  return null; // Latin or digits
}

// Layer 2: Keyword dictionary (Marathi markers vs Hindi markers + romanised)
const LANG_KW={
  mr:["नमस्कार","कसे आहे","आहे","मला","माझे","धन्यवाद","नाही","सुरू करा","आपले","namaskar","kem ahe","marathi"],
  hi:["नमस्ते","कैसे हो","मुझे","मेरा","शुक्रिया","हाँ","नहीं","namaste","pranam","hindi","kaise ho"],
  te:["నమస్కారం","హలో","హాయ్","vandanam","telugu","namaskaram","బాగున్నారా"],
  ta:["வணக்கம்","ஹலோ","ஹாய்","vanakkam","tamil","எப்படி இருக்கீங்க"],
  kn:["ನಮಸ್ಕಾರ","ಹಲೋ","ಹಾಯ್","namaskara","kannada","ಹೇಗಿದ್ದೀರಾ"],
  en:["hello","hi","hey","good morning","good evening","start","begin","ok","english"],
};
function detectByKeyword(text){
  const lower=text.toLowerCase();
  for(const lang of["mr","hi","te","ta","kn"]){
    if(LANG_KW[lang].some(w=>lower.includes(w)))return lang;
  }
  if(LANG_KW.en.some(w=>lower===w||lower.startsWith(w+" ")||lower.endsWith(" "+w)))return"en";
  return null;
}

// Full 3-layer detection
// waMetaLang: string like "mr","hi","en" from WhatsApp metadata (null if not available)
function detectLanguage(text,waMetaLang){
  const script=detectByScript(text);
  // Direct unique scripts
  if(script==="te")return"te";
  if(script==="ta")return"ta";
  if(script==="kn")return"kn";
  // Devanagari — could be Hindi or Marathi
  if(script==="deva"){
    const kw=detectByKeyword(text);
    if(kw==="mr")return"mr";
    if(kw==="hi")return"hi";
    // Layer 3: WhatsApp metadata tiebreaker
    if(waMetaLang==="mr")return"mr";
    if(waMetaLang==="hi")return"hi";
    return"hi"; // Devanagari default = Hindi
  }
  // Unsupported non-Latin scripts (Bengali, Gujarati, Malayalam etc.)
  if(script!==null)return"en";
  // Latin script or digits — use keyword check
  const kw=detectByKeyword(text);
  if(kw)return kw;
  // Layer 3: WhatsApp metadata
  if(waMetaLang&&waMetaLang!=="en")return waMetaLang;
  if(waMetaLang==="en")return"en";
  // Cannot determine — return null → show language buttons
  return null;
}

function addMsg(who,text,intent,handler,opts){
  clearHint();
  const row=document.createElement("div");row.className="row "+who;
  const bub=document.createElement("div");bub.className="bub "+who;bub.textContent=text;row.appendChild(bub);

  msgs.appendChild(row);
  if(opts&&opts.length){

    opts.forEach(o=>{
      if(o.divider){const d=document.createElement("div");d.className="divider";d.textContent=o.divider;ob.appendChild(d);return;}
      const btn=document.createElement("button");
      const isNav=(o.val==="__next__"||o.val==="__prev__");
      btn.className="opt-btn"+(o.link?" link-btn":"")+(isNav?" nav-btn":"")+(o.cls?" "+o.cls:"");
      btn.textContent=o.label;
      if(o.link){btn.onclick=()=>window.open(o.link,"_blank");}
      else{btn.onclick=()=>{ob.querySelectorAll(".opt-btn").forEach(b=>b.disabled=true);sendDirect(o.label,o.val);};}
      ob.appendChild(btn);
    });
    msgs.appendChild(ob);
  }
  msgs.scrollTop=msgs.scrollHeight;
}

// ── Medicine handler ──────────────────────────────────────────────────────────
function buildMedPage(meds,page){
  const total=Math.ceil(meds.length/PAGE_SIZE),start=page*PAGE_SIZE;
  const opts=meds.slice(start,start+PAGE_SIZE).map((med,i)=>({label:`${med.name} — ${med.dose}`,val:`${start+i+1}`}));
  const nav=[];
  if(page>0)nav.push({label:T("btn_prev"),val:"__prev__"});
  if(page<total-1)nav.push({label:T("btn_next"),val:"__next__"});
  return{text:T("med_list",{n:meds.length,p:page+1,t:total,s:start+1,e:Math.min(start+PAGE_SIZE,meds.length)}),intent:"medicine",handler:"MedicineHandler.list_page_"+(page+1),opts:[...opts,...nav,backBtn()]};
}
function handleMed(m){
  if(m==="__next__"){S.ctx.medPage=(S.ctx.medPage||0)+1;return buildMedPage(S.ctx.meds,S.ctx.medPage);}
  if(m==="__prev__"){S.ctx.medPage=Math.max(0,(S.ctx.medPage||0)-1);return buildMedPage(S.ctx.meds,S.ctx.medPage);}
  if(S.step===0){const meds=PAT.medicines;S.ctx.meds=meds;S.ctx.medPage=0;S.step=1;return buildMedPage(meds,0);}
  if(S.step===1){
    const n=parseInt(m),meds=S.ctx.meds;
    if(isNaN(n)||n<1||n>meds.length)return toMainMenu();
    const med=meds[n-1];S.ctx.sel=med;S.step=2;
    return{text:T("med_detail",{name:med.name,dose:med.dose,timing:tD(med.timing),freq:tD(med.freq),dur:tD(med.duration)}),intent:"medicine",handler:"MedicineHandler.detail",opts:[{label:T("btn_view_med"),val:"1"},backBtn()]};
  }
  if(S.step===2){if(m==="1"){S.step=0;return handleMed(m);}return toMainMenu();}
}

    return{text:T("rec_detail",{type:tD(rec.type),date:rec.date,lab:tD(rec.lab)}),intent:"records",handler:"RecordsHandler.detail",opts:[{label:T("btn_view_rec"),val:"1"},backBtn()]};
  }
  if(S.step===2){if(m==="1"){S.step=0;return handleRec(m);}return toMainMenu();}
}

// ── Dispatcher ────────────────────────────────────────────────────────────────
function dispatch(val){
  const m=val.trim().toLowerCase();
  if(S.phase==="locked")return null;

  // ── WELCOME: detect language from first message ──────────────────────────
  if(S.phase==="welcome"){
    // Simulate WhatsApp metadata (null = not available in demo)
    // In production: const waLang = webhookPayload.messages[0].lang || null;
    const waLang=null;
    const detected=detectLanguage(val,waLang);
    if(detected){
      S.lang=detected;setLangBadge();S.phase="yob";
      return{text:T("welcome_yob"),intent:"auth",handler:"AuthHandler.lang_detected_"+detected,opts:[]};
    } else {
      // Cannot determine — show language selection buttons
      S.phase="lang_select";
      return{text:STRINGS.en.lang_select,intent:"auth",handler:"AuthHandler.lang_unknown",opts:getLangOpts()};
    }
  }

  // ── LANG SELECT: user clicked a language button ──────────────────────────
  if(S.phase==="lang_select"){
    if(val.startsWith("lang_")){
      S.lang=val.replace("lang_","");setLangBadge();S.phase="yob";
      return{text:T("welcome_yob"),intent:"auth",handler:"AuthHandler.lang_selected_"+S.lang,opts:[]};
    }
    // Typed something instead of clicking — try detecting again
    const detected=detectLanguage(val,null);
    if(detected){S.lang=detected;setLangBadge();S.phase="yob";return{text:T("welcome_yob"),intent:"auth",handler:"AuthHandler.lang_detected_"+detected,opts:[]};}
    return{text:STRINGS.en.lang_select,intent:"auth",handler:"AuthHandler.lang_unknown",opts:getLangOpts()};
  }

  // ── YOB verification ─────────────────────────────────────────────────────
  if(S.phase==="yob"){
    const yob=parseInt(m),p=PATIENTS[DEMO];
    if(yob===p.yob){S.phase="verified";PAT=p;return{text:mainMenu(),intent:"auth",handler:"AuthHandler.verified",opts:getMainOpts()};}
    S.yobTries++;
    if(S.yobTries>=3){S.phase="locked";setTimeout(lockUI,100);return{text:T("yob_locked"),intent:"auth",handler:"AuthHandler.locked",opts:[]};}
    const rem=3-S.yobTries;
    return{text:T("yob_wrong",{n:rem,s:rem===1?"":"s"}),intent:"auth",handler:"AuthHandler.mismatch",opts:[]};
  }

  // ── Verified: full flow ───────────────────────────────────────────────────
  if(["0","cancel","exit","back","menu","main","वापस","मुख्य मेनू","मागे","రద్దు","ரத்து","ರದ್ದು"].includes(m)){
    resetFlow();return{text:mainMenu(),intent:"cancel",handler:"Dispatcher.reset",opts:getMainOpts()};
  }
  if(S.activeHandler==="medicine"&&(m==="__next__"||m==="__prev__"))return handleMed(m);
  if(S.activeHandler==="help"){
    if(isTextEscape(m)){resetFlow();}else{return toMainMenu();}
  }
  if(S.activeHandler&&S.activeHandler!=="help"&&isTextEscape(m)){resetFlow();}
  if(S.activeHandler&&S.activeHandler!=="help"){
    let res=null;
    if(S.activeHandler==="medicine")res=handleMed(m);
    else if(S.activeHandler==="appointment")res=handleAppt(m);
    else if(S.activeHandler==="vitals")res=handleVitals(m);
    else if(S.activeHandler==="records")res=handleRec(m);
    if(res)return res;
    resetFlow();
  }
  const intent=detectIntent(m);
  if(intent==="unknown")return toMainMenu();
  if(intent==="cancel"){resetFlow();return{text:mainMenu(),intent:"cancel",handler:"Dispatcher.reset",opts:getMainOpts()};}
  if(intent==="help"){S.activeHandler="help";return{text:T("help_title"),intent:"help",handler:"HelpHandler",opts:getHelpOpts()};}
  if(intent==="support"){return{text:T("support_text"),intent:"support",handler:"HelpHandler.support",opts:[backBtn()]};}
  resetFlow();S.activeHandler=intent;
  if(intent==="medicine")return handleMed(m);
  if(intent==="appointment")return handleAppt(m);
  if(intent==="vitals")return handleVitals(m);
  if(intent==="records")return handleRec(m);
}

// ── Send ──────────────────────────────────────────────────────────────────────
function sendDirect(displayText,valText){
  if(S.phase==="locked")return;
  addMsg("you",displayText,null,null,[]);
  showTyping();
  setTimeout(()=>{document.getElementById("typing")?.remove();const res=dispatch(valText);if(res)addMsg("bot",res.text,res.intent,res.handler,res.opts||[]);},380);
}
function send(){const val=inp.value.trim();if(!val)return;inp.value="";sendDirect(val,val);}
inp.addEventListener("keydown",e=>{if(e.key==="Enter")send();});
sbtn.addEventListener("click",send);
</script>
